<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM OVERRIDE</title>
    <style>
        body {
            background-color: #000000;
            color: #00ff00; /* 经典的黑客绿 */
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        h1 { font-size: 2rem; border-right: 2px solid #00ff00; white-space: nowrap; overflow: hidden; animation: typing 2s steps(20, end), blink-caret .75s step-end infinite; }
        p { margin-top: 20px; opacity: 0.7; }
        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #00ff00; } }
    </style>
</head>
<body>
    <h1>> SYSTEM_INITIALIZING...</h1>
    <p>Awaiting payload deployment. Stand by.</p>
</body>
</html>
